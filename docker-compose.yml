# Builds both Seam images from the repo root as the shared build context,
# switching only the Dockerfile per service.
#
# Provide config via a .env file beside this file (or the shell environment):
#   ADMIN_USER=admin@example.com
#   ADMIN_PASS=change-me
#   BETTER_AUTH_SECRET=<long random string>
#   SEAM_CLOUD_URL=https://cloud.example.com   # public URL the browser uses
#   GENERATOR_SERVER_URL=                      # override/disable the generator proxy
#
# Three services: cloud (API), web (editor SPA), generator (transcription /
# enhance). The cloud proxies to the generator over the internal network.
#
#   docker compose up --build

services:
  cloud:
    build:
      context: .
      dockerfile: packages/cloud/Dockerfile
      image: jcgurango/seam-cloud
    environment:
      ADMIN_USER: ${ADMIN_USER:?ADMIN_USER is required}
      ADMIN_PASS: ${ADMIN_PASS:?ADMIN_PASS is required}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      PORT: "8787"
      DATA_DIR: /data
      # Internal service address (server-to-server, so the docker name resolves
      # — unlike the browser-facing SEAM_CLOUD_URL). Override to disable.
      GENERATOR_SERVER_URL: ${GENERATOR_SERVER_URL:-http://generator:8000}
    volumes:
      - cloud-data:/data
    ports:
      - "${CLOUD_PORT:-8787}:8787"
    depends_on:
      - generator
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      image: jcgurango/seam-web
    environment:
      # The PUBLIC base URL the browser uses to reach the cloud — NOT the
      # internal "cloud" service name (the browser can't resolve it). e.g.
      # http://localhost:8787 for local testing, or your real domain.
      SEAM_CLOUD_URL: ${SEAM_CLOUD_URL:-}
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - cloud
    restart: unless-stopped

  # Whisper transcription + Resemble Enhance. CPU baseline — slow but portable;
  # first request downloads models into the cache volume. For GPU, build from a
  # CUDA base + GPU torch and add:
  #   deploy:
  #     resources:
  #       reservations:
  #         devices: [{ driver: nvidia, count: all, capabilities: [gpu] }]
  generator:
    build:
      context: ./packages/generator-server
      image: jcgurango/seam-generator-server
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
    volumes:
      - generator-cache:/cache
    restart: unless-stopped

volumes:
  cloud-data:
  generator-cache:

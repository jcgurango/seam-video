[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "seam-generator-server"
version = "0.1.0"
description = "FastAPI backend for Seam: Whisper transcription + Resemble Enhance denoise"
requires-python = ">=3.10,<3.12"
dependencies = [
    # Web
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "python-multipart>=0.0.9",
    "pydantic>=2.7",
    # Transcription (Silero VAD ships with faster-whisper >= 1.0)
    "faster-whisper>=1.1.0",
    # Denoise
    "resemble-enhance==0.0.1",
    # Audio I/O
    "torch>=2.0",
    "torchaudio>=2.0",
    "soundfile>=0.12",
    "numpy>=1.26",
]

[project.scripts]
generator-server = "generator_server.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
generator_server = ["py.typed"]

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback: serve index.html for client routes (/media,
    # /projects/<name>.seam). try_files has no "dot rule", so the .seam
    # extension is handled fine; real files (assets, /config.js) still serve.
    location / {
        try_files $uri /index.html;
    }

    # config.js is regenerated per-deploy from env — never cache it.
    location = /config.js {
        add_header Cache-Control "no-store";
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
